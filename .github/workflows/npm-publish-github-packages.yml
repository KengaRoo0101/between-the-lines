name: BTL Package Publish Hold

on:
  workflow_dispatch:

jobs:
  package-publish-held:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: echo "Package publishing is disabled while the Stripe/payment hold is active."
